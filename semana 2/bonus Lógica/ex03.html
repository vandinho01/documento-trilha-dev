<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Meu primeiro programa...</title>
    <style>
        body {
            background-color: rgb(105, 105, 173);
            color: white;
            font: normal 20pt Arial;
        }
        h1 {
            color: rgb(255, 212, 22);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição!!</p>
    <script>
        var n1 = parseInt(window.prompt('Digite um numero'));
        var n2 = parseInt(window.prompt('Digite outro nome'));
        var s = n1 + n2;
        window.alert(`A soma entre ${n1} e ${n2} é ${s}`); //Concatenação
        /*É possível usar Number() ao invés de parseInt / parseFloat*/
        // s.length - quantos caracteres a string tem
        // s.toUpperCase() - tudo para MAIUSCULA
        // s.toLowerCase() - tudo para minuscula
    </script>
</body>
</html>
