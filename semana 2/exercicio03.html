<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box-nav">
        <h1>Exercício #03</h1>
    </div>

    <div class="box">
        <p> Leia as idades de duas crianças. Após, calcular e mostrar a soma das idades e a média.</p>
        <input type="number" id="idade1" placeholder="Digite a primeira idade"> <br> <br>
        <input type="number" id="idade2" placeholder="Digite a segunda idade"> <br> <br>
        <button onclick="somaMedia()">Enviar</button>
    </div>

</body>
    <script>
        function somaMedia(){
            var idade1 = parseInt(document.getElementById('idade1').value);
            var idade2 = parseInt(document.getElementById('idade2').value);

            var soma = idade1 + idade2;
            console.log(`A soma é ${soma}`);

            var media = soma / 2;
            console.log(`A soma é ${media}`)
            
        }
    </script>
</html>
