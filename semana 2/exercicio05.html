<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box-nav">
        <h1>Exercício #05</h1>
    </div>

    <div class="box">
        <p>Leia uma temperatura em Graus celsius. Após, calcular e mostrar a mesma temperatura em graus Fahrenheit.</p>
        <input type="number" id="temperatura" placeholder="Digite um valor"> <br> <br>
        <button onclick="calculo()">Enviar</button>
    </div>

</body>

<script>

    function calculo(){
        var celsius = document.getElementById('temperatura').value;
        var fahrenheit = (celsius * 1.8) + 32;

        alert(`A temperatura em graus Fahrenheit é: ${fahrenheit} `);
    }

</script>
</html>
